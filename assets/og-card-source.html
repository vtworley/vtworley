<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Sans:wght@400;500&display=swap" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #faf7f0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 1040px;
    text-align: center;
  }
  .rule {
    width: 64px;
    height: 2px;
    background: #192e1a;
    border: 0;
    margin: 0 auto 36px;
  }
  .name {
    font-family: "EB Garamond", Georgia, serif;
    font-style: italic;
    font-weight: 500;
    font-size: 92px;
    line-height: 1.1;
    color: #1a1916;
    margin: 0 0 28px;
  }
  .subtitle {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 22px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: #5b574f;
    margin: 0 0 48px;
    white-space: nowrap;
  }
  .tags {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px;
    margin: 0 0 52px;
    padding: 0;
    list-style: none;
  }
  .tags li {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 23px;
    background: rgba(25, 46, 26, 0.08);
    color: #192e1a;
    padding: 10px 26px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .url {
    font-family: "IBM Plex Sans", sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: #5b574f;
  }
</style>
</head>
<body>
  <div class="card">
    <hr class="rule" />
    <p class="name">Victoria T. Worley</p>
    <p class="subtitle">PhD Candidate &middot; Government and Politics &middot; University of Maryland</p>
    <ul class="tags">
      <li>Federalism</li>
      <li>State attorneys general</li>
      <li>Public law</li>
      <li>Judicial politics</li>
      <li>State politics</li>
    </ul>
    <p class="url">vtworley.github.io</p>
  </div>
</body>
</html>
